<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Viajes Colombia | Tu próximo viaje empieza aquí</title>
 
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">

</head>
 
<body class="bg-light">
 
  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-primary px-3">
    <div class="viajes-colombia-logo">
        <img src="/assets/images/logo.svg"
        alt="Logo"
        height="120"
        width="auto"
        class="d-inline-block align-text-top">
    </div>
     
    <button class="btn btn-outline-light" id="cart-btn">
        <img src="/assets/images/airplane.svg"
        alt="avion"
        height="38"
        width="auto"
        class="d-inline-block align-text-top">
        Tus Planes
    <i class="bi bi-airplane-fill"></i>
    <span class="badge bg-light text-dark" id="cart-count">0</span>
    </button>
  </nav>
 
  <!-- HERO -->
  <header class="container text-center my-5">
    <h1 class="fw-bold">
      Descubre los destinos más increíbles de Colombia
    </h1>
    <p class="text-muted">
      Tu próximo viaje comienza con nosotros
    </p>
  </header>
 
  <!-- FILTROS -->
  <section class="container text-center mb-4">
    <button class="btn btn-outline-primary me-2" onclick="filterByRegion('all')">
      Todos
    </button>
    <button class="btn btn-outline-primary me-2" onclick="filterByRegion('Caribe')">
      Caribe
    </button>
    <button class="btn btn-outline-primary" onclick="filterByRegion('Andina')">
      Andina
    </button>
  </section>
 
  <!-- DESTINOS -->
  <main class="container">
    <section class="row g-4" id="destinations"></section>
  </main>
 
  <!-- CARRITO / OFFCANVAS -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartCanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">🧳 Tus viajes</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
 
    <div class="offcanvas-body">
      <ul class="list-group mb-3" id="cart-items"></ul>
      <p class="fw-bold fs-5">
        Total: <span id="total"></span>
      </p>
    </div>
  </div>
 
  <!-- MODAL BIENVENIDA -->
  <div class="modal fade" id="welcomeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
 
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">🇨🇴 ¡Bienvenido a Colombia Travel!</h5>
        </div>
 
        <div class="modal-body">
          <p>Queremos acompañarte en tu próximo viaje ✈️</p>
 
          <label for="lastTrip" class="form-label">
            ¿Cuándo fue la última vez que viajaste?
          </label>
 
          <select id="lastTrip" class="form-select">
            <option value="">Selecciona una opción</option>
            <option>Hace menos de 6 meses</option>
            <option>Hace más de un año</option>
            <option>Hace varios años</option>
            <option>Nunca he viajado</option>
          </select>
        </div>
 
        <div class="modal-footer">
          <button class="btn btn-primary" id="startJourney">
            Comenzar mi próximo viaje
          </button>
        </div>
 
      </div>
    </div>
  </div>
 
  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>
 
  <!-- App JS -->
  <script src="assets/js/app.js"></script>
  <audio id="planeSound" src="/assets/audio/despegue.mp3" preload="auto">
</body>
</html>
