<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Colombia Travel | Tu próximo viaje empieza aquí</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light" style="font-family: 'Montserrat', sans-serif;">

  <nav class="navbar navbar-dark px-3" style="background-color: #0a1680;">
    <span class="navbar-brand fw-bold">🇨🇴 Colombia Travel</span>
    <button class="btn btn-outline-light" id="cart-btn" data-bs-toggle="offcanvas" data-bs-target="#cartCanvas">
      ✈️ Planes
      <span class="badge bg-light text-dark" id="cart-count">0</span>
    </button>
  </nav>

  <section id="banner-dinamico" style="position: relative; width: 100%; height: 80vh; min-height: 500px; background-size: cover; background-position: center; background-attachment: fixed; display: block !important;">
    <div class="hero-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 22, 128, 0.4); display: flex; align-items: center; justify-content: center;">
      <div class="container text-center text-white">
        <h1 class="display-1 fw-bold mb-3" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">Explora Colombia</h1>
        <p class="fs-2 mb-4">Tu próximo viaje empieza aquí</p>
        <a href="#destinations" class="btn btn-lg fw-bold px-5 py-3 shadow" style="background-color: #f1b94c; color: #0a1680; border: none;">
          EMPEZAR AVENTURA
        </a>
      </div>
    </div>
  </section>

  <section class="container text-center my-5">
    <button class="btn btn-outline-primary me-2" onclick="filterByRegion('all')">Todos</button>
    <button class="btn btn-outline-primary me-2" onclick="filterByRegion('Caribe')">Caribe</button>
    <button class="btn btn-outline-primary" onclick="filterByRegion('Andina')">Andina</button>
  </section>

  <main class="container" id="destinations-section">
    <section class="row g-4" id="destinations"></section>
  </main>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartCanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">🧳 Tus viajes</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul class="list-group mb-3" id="cart-items"></ul>
      <p class="fw-bold fs-5">Total: <span id="total"></span></p>
    </div>
  </div>

  <div class="modal fade" id="welcomeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header text-white" style="background-color: #0a1680;">
          <h5 class="modal-title">🇨🇴 ¡Bienvenido a Colombia Travel!</h5>
        </div>
        <div class="modal-body">
          <p>Queremos acompañarte en tu próximo viaje ✈️</p>
          <label for="lastTrip" class="form-label">¿Cuándo fue la última vez que viajaste?</label>
          <select id="lastTrip" class="form-select">
            <option value="">Selecciona una opción</option>
            <option>Hace menos de 6 meses</option>
            <option>Hace más de un año</option>
            <option>Hace varios años</option>
            <option>Nunca he viajado</option>
          </select>
        </div>
        <div class="modal-footer">
          <button class="btn text-white" id="startJourney" style="background-color: #0a1680;">Comenzar mi próximo viaje</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
